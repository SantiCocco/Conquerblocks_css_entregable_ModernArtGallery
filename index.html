<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Art Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:opsz,wght@18..144,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

  <body>
  <main>
    <section class="hero">
      <div class="container">
        <div class="hero__content">
          <h1 class="hero__title">Build your best community starting from here.</h1>
          <p class="hero__description">Meet and communicate with the best people to run projects, events or other activities in a more effective and fun way</p>

          <div class="hero__actions">
            <button class="btn--primary">Get Started</button>
            <a href="#" class="btn--text">Learn More &rarr;</a>
          </div>

          <ul class="hero__features">
            <li class="hero__feature">
              <img src="img/icon-comments.svg" alt="comments icon">
              <span class="hero__feature-text">Build Community</span>
            </li>
            <li class="hero__feature">
              <img src="img/icon-schedule.svg" alt="events icon">
              <span class="hero__feature-text">Share Events</span>
            </li>
            <li class="hero__feature">
              <img src="img/icon-post.svg" alt="information icon">
              <span class="hero__feature-text">Get Information</span>
            </li>
          </ul>
        </div>

        <div class="hero__visuals">
          <div class="hero__gallery">
            <div class="hero__image-card hero__image-card--purple">
              <img src="img/gallery-serious-calm-guy-with-dark-skin-and-beard.png" alt="serious calm guy with dark skin and beard">
            </div>
            <div class="hero__image-card hero__image-card--teal">
              <img src="img/gallery-young-asian-woman-smiling.png" alt="young asian woman smiling">
            </div>
            <div class="hero__image-card hero__image-card--yellow">
              <img src="img/gallery-positive-dark-skinned-woman.png" alt="positive dark skinned woman">
            </div>
            <div class="hero__image-card hero__image-card--pink">
              <img src="img/gallery-young-european-woman-in-glasses.png" alt="young european woman in glasses">
            </div>
            <div class="hero__image-card hero__image-card--orange">
              <img src="img/gallery-positive-smiling-caucasian-man.png" alt="positive smiling caucasian man">
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
